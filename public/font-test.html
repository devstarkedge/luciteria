<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Font Overlap Test - All Breakpoints</title>
<style>
body { margin: 0; padding: 10px; background: #f3f4f6; font-family: system-ui, sans-serif; }
h2 { margin: 10px 0 5px; font-size: 14px; color: #374151; }
.test-container { margin-bottom: 20px; border: 2px solid #6b7280; padding: 5px; background: #fff; overflow: hidden; }

/* Base cell styles (copied from tailwind.css) */
.ptable{display:grid;grid-template-columns:repeat(18,minmax(0,1fr));gap:4px;}
.frow{display:grid;grid-template-columns:repeat(18,minmax(0,1fr));gap:4px;}
.cell{aspect-ratio:1/1;border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff;border:1px solid #d1d5db;position:relative;cursor:pointer;overflow:hidden;}

/* SMALL (< 768px) */
.small .cell .num{position:absolute;top:2px;left:3px;font-size:8px;color:#9ca3af;}
.small .cell .sym{font-size:14px;font-weight:600;color:#4b5563;line-height:1;}
.small .cell .nm{font-size:6px;color:#9ca3af;margin-top:1px;}

/* MEDIUM (768px-1023px) */
.medium .cell .num{position:absolute;top:2px;left:3px;font-size:12px;color:#9ca3af;}
.medium .cell .sym{font-size:20px;font-weight:600;color:#4b5563;line-height:1;}
.medium .cell .nm{font-size:8px;color:#9ca3af;margin-top:1px;}

/* LARGE (1024px+) */
.large .cell .num{position:absolute;top:2px;left:3px;font-size:15px;color:#9ca3af;}
.large .cell .sym{font-size:26px;font-weight:600;color:#4b5563;line-height:1;}
.large .cell .nm{font-size:11px;color:#9ca3af;margin-top:1px;}

.highlight { border: 2px solid red !important; }
</style>
</head>
<body>
<h1 style="font-size:16px;">Periodic Table Font Overlap Test</h1>

<h2>SMALL viewport (width: 500px) — fonts: 14px/8px/6px</h2>
<div class="test-container small" style="width:500px;" id="small-table"></div>

<h2>MEDIUM viewport (width: 768px) — fonts: 20px/12px/8px</h2>
<div class="test-container medium" style="width:768px;" id="medium-table"></div>

<h2>LARGE viewport (width: 1024px) — fonts: 26px/15px/11px</h2>
<div class="test-container large" style="width:1024px;" id="large-table"></div>

  {z:99,sym:"Es",name:"Einsteinium",row:10,col:14},{z:100,sym:"Fm",name:"Fermium",row:10,col:15},
  {z:101,sym:"Md",name:"Mendelevium",row:10,col:16},{z:102,sym:"No",name:"Nobelium",row:10,col:17},
  {z:103,sym:"Lr",name:"Lawrencium",row:10,col:18}

function buildTable(containerId) {
  const container = document.getElementById(containerId);
  const main = ELEMENTS.filter(e => e.row >= 1 && e.row <= 7);
  const lanth = ELEMENTS.filter(e => e.row === 9).sort((a,b) => a.z - b.z);
  const actin = ELEMENTS.filter(e => e.row === 10).sort((a,b) => a.z - b.z);

  let html = '<div class="ptable">';
  for (const el of main) {
    html += `<div class="cell" style="grid-column:${el.col};grid-row:${el.row}" title="${el.name}">
      <span class="num">${el.z}</span><span class="sym">${el.sym}</span><span class="nm">${el.name}</span>
    </div>`;
  }
  html += '</div>';
  
  html += '<div class="frow" style="margin-top:8px;"><div style="grid-column:1/4"></div>';
  for (const el of lanth) {
    html += `<div class="cell" title="${el.name}"><span class="num">${el.z}</span><span class="sym">${el.sym}</span><span class="nm">${el.name}</span></div>`;
  }
  html += '</div>';
  
  html += '<div class="frow" style="margin-top:4px;"><div style="grid-column:1/4"></div>';
  for (const el of actin) {
    html += `<div class="cell" title="${el.name}"><span class="num">${el.z}</span><span class="sym">${el.sym}</span><span class="nm">${el.name}</span></div>`;
  }
  html += '</div>';
  
  container.innerHTML = html;
}

buildTable('small-table');
buildTable('medium-table');
buildTable('large-table');

// After rendering, check for overflow
setTimeout(() => {
  const issues = [];
  document.querySelectorAll('.cell').forEach(cell => {
    const nm = cell.querySelector('.nm');
    const sym = cell.querySelector('.sym');
    const num = cell.querySelector('.num');
    if (nm && nm.scrollWidth > cell.clientWidth) {
      const elName = nm.textContent;
      const size = cell.closest('.test-container').className.match(/small|medium|large/)[0];
      issues.push(`${size}: "${elName}" name overflows (${nm.scrollWidth}px > ${cell.clientWidth}px cell)`);
      cell.classList.add('highlight');
    }
  });
  const report = document.createElement('div');
  report.style.cssText = 'margin:20px 0;padding:10px;background:#fef2f2;border:1px solid #ef4444;border-radius:4px;';
  report.innerHTML = '<h3 style="color:#dc2626;margin:0 0 5px;">Overflow Issues Found:</h3>' + 
    (issues.length ? '<ul>' + issues.map(i => '<li>'+i+'</li>').join('') + '</ul>' : '<p>No overflow detected</p>');
  document.body.insertBefore(report, document.body.firstChild.nextSibling);
}, 500);
</script>
</body>
</html>
